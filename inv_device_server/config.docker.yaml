mqtt:
  broker: jiuxiaoyw.online
  port: 8883
  client_id: CSKJ-INV-SERVER-DEVICE
  username: "CSKJ-INV-SERVER-DEVICE"
  password: "CSKJINVSERVERDEVICE"
