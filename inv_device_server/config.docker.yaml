server:
  port: 8081
  read_timeout: 30s
  write_timeout: 30s
  mode: release

database:
  host: ${DB_HOST:-postgres}
  port: ${DB_PORT:-5432}
  user: ${DB_USER:-postgres}
  password: ${DB_PASSWORD:-inv_mqtt_2024}
  database: inv_mqtt
  ssl_mode: disable
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: 1h

redis:
  host: ${REDIS_HOST:-redis}
  port: ${REDIS_PORT:-6379}
  password: ""
  db: 0

mqtt:
  broker: ${MQTT_BROKER:-jiuxiaoyw.online}
  port: ${MQTT_PORT:-8883}
  client_id: CSKJ-INV-SERVER-DEVICE
  username: ${MQTT_USERNAME:-CSKJ-INV-SERVER-DEVICE}
  password: ${MQTT_PASSWORD:-CSKJINVSERVERDEVICE}
  qos: 1

log:
  level: info
  filename: logs/device-server.log
  max_size: 100
  max_backups: 10
  max_age: 30
  compress: true

timezone: Asia/Shanghai
