  write_timeout: 30s
  mode: release

database:
  host: postgres
  port: 5432
  user: postgres
  password: "cs_inv_admin_2026_test"
  database: inv_mqtt
  ssl_mode: disable
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: 1h

redis:
  host: redis
  port: 6379
  password: ""
