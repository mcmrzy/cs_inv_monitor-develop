server:
  port: 8080
  mode: release

jwt:
  secret: "${JWT_SECRET}"

rate_limit:
  rate: 100
  burst: 200

route_rate_limits:
  - path_prefix: "/api/v1/devices"
    rate: 50
    burst: 100
  - path_prefix: "/api/v1/auth/login"
    rate: 10
    burst: 20
  - path_prefix: "/api/v1/auth/register"
    rate: 5
    burst: 10
  - path_prefix: "/api/v1/auth/send-code"
    rate: 2
    burst: 5

backends:
  api_server: "${API_SERVER_URL}"
  device_server: "${DEVICE_SERVER_URL}"

redis:
  host: "${REDIS_HOST}"
  port: ${REDIS_PORT}
  password: "${REDIS_PASSWORD}"
  db: 0

rbac:
  enabled: true
  cache_ttl_sec: 300

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    # 生产环境添加实际域名
    # - "https://your-domain.com"

database:
  host: "${DB_HOST}"
  port: ${DB_PORT}
  user: "${DB_USER}"
  password: "${DB_PASSWORD}"
  name: "${DB_NAME}"
