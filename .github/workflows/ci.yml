name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  go-check:
    name: Go Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [inv_api_server, inv_device_server, api-gateway, mqtt-kafka-bridge]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build ./...
      - name: Vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...
      - name: Test
        working-directory: ${{ matrix.module }}
        run: go test -race -count=1 ./...

  frontend-check:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: inv-admin-frontend/package-lock.json
      - name: Install
        working-directory: inv-admin-frontend
        run: npm ci
      - name: Type Check
        working-directory: inv-admin-frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: inv-admin-frontend
        run: npm run build

  flutter-check:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44'
          channel: 'stable'
      - name: Pub Get
        working-directory: inv_app
        run: flutter pub get
      - name: Analyze
        working-directory: inv_app
        run: flutter analyze --no-fatal-warnings
      - name: Test
        working-directory: inv_app
        run: flutter test
