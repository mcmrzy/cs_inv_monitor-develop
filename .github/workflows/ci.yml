name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  go-check:
    name: Go Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [business-api, device-communication, api-gateway, mqtt-kafka-bridge]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build ./...
      - name: Vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...
      - name: Run Go tests with coverage
        working-directory: ${{ matrix.module }}
        run: go test -race -cover -coverprofile=coverage.out -count=1 ./...
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: matrix.module == 'business-api'
        with:
          name: go-coverage
          path: ${{ matrix.module }}/coverage.out

  frontend-check:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: inv-admin-frontend/package-lock.json
      - name: Install
        working-directory: inv-admin-frontend
        run: npm ci
      - name: Type Check
        working-directory: inv-admin-frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: inv-admin-frontend
        run: npm run build
      - name: Run frontend tests
        working-directory: inv-admin-frontend
        run: npm run test:run --if-present

  flutter-check:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44'
          channel: 'stable'
      - name: Pub Get
        working-directory: inv_app
        run: flutter pub get
      - name: Analyze
        working-directory: inv_app
        # Informational style debt remains visible, while warnings and errors
        # are release-blocking (unlike the previous unconditional `|| true`).
        run: flutter analyze --no-fatal-infos
      - name: Test
        working-directory: inv_app
        run: flutter test --coverage
      - name: Build unsigned release APK
        working-directory: inv_app
        run: flutter build apk --release --dart-define=API_BASE_URL=https://example.invalid/api/v1

  integration-test:
    name: Integration Tests
    needs: [go-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
      - name: Start isolated integration environment
        run: docker compose -f deploy/docker-compose.test.yml up -d --build --wait --wait-timeout 300
      - name: Run integration tests
        working-directory: tests/integration
        env:
          TEST_REQUIRE_SERVICES: "true"
        run: go test -v -tags=integration -count=1 ./...
      - name: Show service logs on failure
        if: failure()
        run: docker compose -f deploy/docker-compose.test.yml logs --no-color
      - name: Stop integration environment
        if: always()
        run: docker compose -f deploy/docker-compose.test.yml down -v

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
      - name: Run security tests
        run: cd business-api && go test -v -count=1 ./tests/security/...
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan Go modules for reachable vulnerabilities
        shell: bash
        run: |
          set -euo pipefail
          for module in business-api device-communication api-gateway mqtt-kafka-bridge; do
            (cd "$module" && govulncheck ./...)
          done
