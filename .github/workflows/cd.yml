name: CD - Deploy to Production

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  
  # жүӢеҠЁи§ҰеҸ‘пјҲз”ЁдәҺжөӢиҜ•пјү
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate production environment
        run: |
          echo "Checking if production environment is configured..."
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "вқ?SERVER_HOST secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_USERNAME }}" ]; then
            echo "вқ?SERVER_USERNAME secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "вқ?SSH_PRIVATE_KEY secret is not set"
            exit 1
          fi
          echo "вң?All required secrets are configured"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            # иҝӣе…ҘйЎ№зӣ®зӣ®еҪ•
            cd /opt/inv-mqtt
            
            # жӢүеҸ–жңҖж–°д»Јз ?
            git fetch origin
            git checkout main
            git pull origin main
            
            # иҝӣе…ҘйғЁзҪІзӣ®еҪ•
            cd deploy
            
            # жё…зҗҶж—§е®№еҷЁпјҲеҗ«еӯӨз«Ӣе®№еҷЁпјүпјҢйҳІжӯўе®№еҷЁеҗҚеҶІзӘҒ
            docker compose -f docker-compose.prod.yml --env-file .env.prod down --remove-orphans
            # Force remove conflicting containers
            docker rm -f inv-admin-frontend inv-api-gateway inv-api-server inv-device-server inv-postgres inv-redis 2>/dev/null || true
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
            
            # жё…зҗҶжңӘдҪҝз”Ёзҡ„ Docker й•ңеғҸ
            docker image prune -f
            
            # жЈҖжҹҘжңҚеҠЎзҠ¶жҖ?
            echo "=== жңҚеҠЎзҠ¶жҖ?==="
            docker compose -f docker-compose.prod.yml --env-file .env.prod ps
            
            echo "=== жңҖиҝ‘ж—Ҙеҝ?==="
            docker compose -f docker-compose.prod.yml --env-file .env.prod logs --tail=20
            
            # еҒҘеә·жЈҖжҹ?
            echo "=== еҒҘеә·жЈҖжҹ?==="
            sleep 10
            
            # жЈҖжҹ?API Gateway
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "вң?API Gateway жӯЈеёё"
            else
              echo "вқ?API Gateway ејӮеёё"
              exit 1
            fi
            
            # жЈҖжҹҘеүҚз«?
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "вң?Admin Frontend жӯЈеёё"
            else
              echo "вқ?Admin Frontend ејӮеёё"
              exit 1
            fi
            
            echo "рҹҺү йғЁзҪІжҲҗеҠҹе®ҢжҲҗпј?