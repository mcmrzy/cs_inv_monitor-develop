name: CD - Deploy to Production

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}

      - name: Verify required production migrations
        shell: bash
        run: |
          for version in 023 024 025; do
            compgen -G "database/migrations/${version}_*.sql" > /dev/null || {
              echo "Missing required migration ${version}_*.sql"
              exit 1
            }
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push inv-device-server
        uses: docker/build-push-action@v6
        with:
          context: ./inv_device_server
          file: ./inv_device_server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/inv-device-server:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/inv-device-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push inv-api-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./inv_api_server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/inv-api-server:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/inv-api-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push api-gateway
        uses: docker/build-push-action@v6
        with:
          context: ./api-gateway
          file: ./api-gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/api-gateway:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push inv-admin-frontend
        uses: docker/build-push-action@v6
        with:
          context: ./inv-admin-frontend
          file: ./inv-admin-frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/inv-admin-frontend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/inv-admin-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            cd /opt/inv-mqtt
            git fetch origin
            git checkout main
            git pull origin main
            cd deploy

            # 设置镜像 tag（先移除旧的 IMAGE_TAG 行再追加）
            ENV_FILE=.secrets/.env.prod
            test -f "$ENV_FILE" || { echo "Missing server-side $ENV_FILE"; exit 1; }
            sed -i '/^IMAGE_TAG=/d' "$ENV_FILE"
            echo "IMAGE_TAG=${{ env.IMAGE_TAG }}" >> "$ENV_FILE"


            # 登录 ghcr.io
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 拉取新镜像
            docker compose -f docker-compose.prod.yml --env-file "$ENV_FILE" pull

            # PostgreSQL major versions cannot reuse a PG16 data directory.
            if docker inspect inv-postgres > /dev/null 2>&1; then
              PG_MAJOR=$(docker exec inv-postgres psql -U postgres -d inv_mqtt -Atqc "SHOW server_version_num" | cut -c1-2)
              if [ "$PG_MAJOR" != "18" ]; then
                echo "PostgreSQL $PG_MAJOR data must be upgraded to 18 before deployment"
                exit 1
              fi
            fi

            docker run --rm --entrypoint sh "ghcr.io/${{ github.repository_owner }}/inv-api-server:${{ env.IMAGE_TAG }}" -c '
              for version in 023 024 025; do
                ls /app/database/migrations/${version}_*.sql > /dev/null 2>&1 || exit 1
              done
            '

            # 增量更新。Compose 会等待 PostgreSQL/Redis 健康、API 完成迁移并
            # 健康后才启动 Device Server；迁移失败时部署立即失败。
            docker compose -f docker-compose.prod.yml --env-file "$ENV_FILE" up -d --remove-orphans --wait --wait-timeout 180

            # 清理旧镜像
            docker image prune -f

            # 健康检查
            echo "=== 服务状态 ==="
            docker compose -f docker-compose.prod.yml --env-file "$ENV_FILE" ps

            sleep 10

            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "✅ API Gateway 正常"
            else
              echo "❌ API Gateway 异常"
              exit 1
            fi

            if docker ps --format "{{.Names}}" | grep -q inv-admin-frontend && docker inspect -f "{{.State.Running}}" inv-admin-frontend | grep -q true; then
              echo "✅ Admin Frontend 正常"
            else
              echo "❌ Admin Frontend 异常"
              exit 1
            fi

            echo "🎉 部署成功完成！"
