name: CD - Deploy to Production

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  
  # 手动触发（用于测试）
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate production environment
        run: |
          echo "Checking if production environment is configured..."
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "❌ SERVER_HOST secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_USERNAME }}" ]; then
            echo "❌ SERVER_USERNAME secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "❌ SSH_PRIVATE_KEY secret is not set"
            exit 1
          fi
          echo "✅ All required secrets are configured"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 进入项目目录
            cd /opt/inv-mqtt
            
            # 拉取最新代码
            git fetch origin
            git checkout main
            git pull origin main
            
            # 更新环境变量（如果需要）
            # 注意：生产环境的 .env.prod 文件应该提前配置好
            
            # 重新构建并部署服务
            cd deploy
            docker compose -f docker-compose.prod.yml --env-file .env.prod down
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
            
            # 清理未使用的 Docker 镜像
            docker image prune -f
            
            # 检查服务状态
            echo "=== 服务状态 ==="
            docker compose -f docker-compose.prod.yml --env-file .env.prod ps
            
            echo "=== 最近日志 ==="
            docker compose -f docker-compose.prod.yml --env-file .env.prod logs --tail=20
            
            # 健康检查
            echo "=== 健康检查 ==="
            sleep 10
            
            # 检查 API Gateway
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "✅ API Gateway 正常"
            else
              echo "❌ API Gateway 异常"
              exit 1
            fi
            
            # 检查前端
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ Admin Frontend 正常"
            else
              echo "❌ Admin Frontend 异常"
              exit 1
            fi
            
            echo "🎉 部署成功完成！"