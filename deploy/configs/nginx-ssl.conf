# ============================================================
# Nginx HTTPS Configuration Template
# ============================================================
# This template provides production-ready HTTPS for the admin
# frontend + API gateway stack.
#
# Certificate options:
#   1. Let's Encrypt (recommended for production with a domain):
#      Use certbot to obtain certs, then set:
#        ssl_certificate     /etc/letsencrypt/live/<domain>/fullchain.pem;
#        ssl_certificate_key /etc/letsencrypt/live/<domain>/privkey.pem;
#
#   2. Self-signed (for internal/testing):
#      Generate with:
#        openssl req -x509 -newkey rsa:2048 -keyout selfsigned.key \
#          -out selfsigned.crt -days 365 -nodes -subj "/CN=<domain>"
#      Mount into container and update paths below.
#
# Usage:
#   - Copy this file to deploy/configs/nginx-ssl.conf
#   - Replace <DOMAIN> with your actual domain
#   - Mount certificates into the nginx container
#   - Replace the default nginx.conf with this file (or include it)
# ============================================================

# ---------- HTTP → HTTPS redirect ----------
server {
    listen 80;
    server_name <DOMAIN>;

    # Let's Encrypt ACME challenge path (if using certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS server ----------
server {
    listen 443 ssl http2;
    server_name <DOMAIN>;

    # --- SSL certificates ---
    # Option A: Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/<DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<DOMAIN>/privkey.pem;

    # Option B: Self-signed (uncomment and update paths)
    # ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    # ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # --- TLS best practices ---
    # Only allow TLS 1.2 and 1.3 (disable TLS 1.0/1.1)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Strong cipher suites — TLS 1.3 ciphers are negotiated automatically
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP stapling (requires trusted certificate chain)
    ssl_stapling on;
    ssl_stapling_verify on;
    # ssl_trusted_certificate /etc/letsencrypt/live/<DOMAIN>/chain.pem;

    # Session resumption
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- Security headers ---
    # HSTS: enforce HTTPS for 1 year (include subdomains, preload-ready)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- Upload size ---
    client_max_body_size 200m;

    # --- Frontend static files ---
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # --- API proxy ---
    location /api/ {
        proxy_pass http://inv-api-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Authorization $http_authorization;
    }

    # --- WebSocket proxy ---
    location /ws/ {
        proxy_pass http://inv-api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # --- Static asset caching ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }
}
