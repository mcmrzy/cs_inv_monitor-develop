# ============================================================
# cs_inv_monitor - Production Docker Compose
# Excludes EMQX/Kafka/mqtt-kafka-bridge (running externally)
# ============================================================

name: inv-monitor-prod

services:
  # ---------- PostgreSQL (TimescaleDB) ----------
  postgres:
    image: timescale/timescaledb:latest-pg18
    container_name: inv-postgres
    command: postgres -c max_connections=300 -c shared_buffers=256MB
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: inv_mqtt
      TZ: UTC
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      # PostgreSQL 18 stores clusters below a version-specific subdirectory.
      - pg-data:/var/lib/postgresql
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../database/migration_timescaledb.sql:/docker-entrypoint-initdb.d/02-timescaledb.sql:ro
    networks:
      - inv-prod-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inv_mqtt"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ---------- Redis ----------
  redis:
    image: redis:7.2-alpine
    container_name: inv-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    command: ["sh", "-c", "exec redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --notify-keyspace-events Ex"]
    networks:
      - inv-prod-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ---------- inv-device-server ----------
  inv-device-server:
    image: ghcr.io/mcmrzy/inv-device-server:${IMAGE_TAG:?IMAGE_TAG must be an immutable release tag}
    container_name: inv-device-server
    expose:
      - "8081"
    env_file:
      - .env.prod
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      MQTT_BROKER: ${MQTT_BROKER}
      MQTT_PORT: ${MQTT_PORT}
      KAFKA_BROKER: ${KAFKA_BROKER}
      API_SERVER_URL: http://inv-api-server:8080
      INTERNAL_KEY: ${INTERNAL_KEY}
    volumes:
      - ./configs/device-server.yaml:/app/config.yaml:ro
      - device-logs:/app/logs
    networks:
      - inv-prod-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      inv-api-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.5"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ---------- inv-api-server ----------
  inv-api-server:
    image: ghcr.io/mcmrzy/inv-api-server:${IMAGE_TAG:?IMAGE_TAG must be an immutable release tag}
    container_name: inv-api-server
    expose:
      - "8080"
    env_file:
      - .env.prod
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      DEVICE_SERVER_URL: http://inv-device-server:8081
      INTERNAL_KEY: ${INTERNAL_KEY}
      JPUSH_ENABLED: ${JPUSH_ENABLED:-false}
      JPUSH_APP_KEY: ${JPUSH_APP_KEY}
      JPUSH_MASTER_SECRET: ${JPUSH_MASTER_SECRET}
      JPUSH_TIMEOUT: ${JPUSH_TIMEOUT:-10}
      JPUSH_DEDUP_TTL: ${JPUSH_DEDUP_TTL:-120}
    volumes:
      - ./configs/api-server.yaml:/app/config.yaml:ro
      - ../database:/app/database:ro  # 挂载数据库迁移文件，启动时自动执行
    networks:
      - inv-prod-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.5"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ---------- api-gateway ----------
  api-gateway:
    image: ghcr.io/mcmrzy/api-gateway:${IMAGE_TAG:?IMAGE_TAG must be an immutable release tag}
    container_name: inv-api-gateway
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env.prod
    environment:
      JWT_SECRET: ${JWT_SECRET}
      API_SERVER_URL: http://inv-api-server:8080
      DEVICE_SERVER_URL: http://inv-device-server:8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ./configs/gateway.yaml:/app/config.yaml:ro
    networks:
      - inv-prod-network
    restart: unless-stopped
    depends_on:
      - inv-api-server
      - inv-device-server
      - redis
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ---------- inv-admin-frontend ----------
  inv-admin-frontend:
    image: ghcr.io/mcmrzy/inv-admin-frontend:${IMAGE_TAG:?IMAGE_TAG must be an immutable release tag}
    container_name: inv-admin-frontend
    expose:
      - "80"
    networks:
      - inv-prod-network
    restart: unless-stopped
    depends_on:
      - api-gateway
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: inv-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ${LETSENCRYPT_DIR:-/etc/letsencrypt}:/etc/letsencrypt:ro
      - ${CERTBOT_WWW_DIR:-/var/www/certbot}:/var/www/certbot:ro
    networks:
      - inv-prod-network
    restart: unless-stopped
    depends_on:
      - inv-admin-frontend
      - api-gateway
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

networks:
  inv-prod-network:
    driver: bridge

volumes:
  pg-data:
  redis-data:
  device-logs:
