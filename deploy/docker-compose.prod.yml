# ============================================================
# cs_inv_monitor - Production Docker Compose
# Excludes EMQX/Kafka/mqtt-kafka-bridge (running externally)
# ============================================================

name: inv-monitor-prod

services:
  # ---------- PostgreSQL (TimescaleDB) ----------
  postgres:
    build:
      context: ..
      dockerfile: deploy/postgres/Dockerfile
    image: inv-postgres-tls:2.28.2-pg18
    container_name: inv-postgres
    command: >-
      postgres
      -c max_connections=300
      -c shared_buffers=256MB
      -c ssl=on
      -c ssl_cert_file=/var/lib/postgresql/tls/server.crt
      -c ssl_key_file=/var/lib/postgresql/tls/server.key
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: inv_mqtt
      TZ: UTC
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/18/docker
    networks:
      - inv-prod-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inv_mqtt"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: inv-redis
    volumes:
      - redis-data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --notify-keyspace-events Ex
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - inv-prod-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ---------- inv-device-server ----------
  # Starts only after API migrations have completed and API is healthy.
  inv-device-server:
    image: ghcr.io/mcmrzy/inv-device-server:${IMAGE_TAG:-latest}
    container_name: inv-device-server
    expose:
      - "8081"
    env_file:
      - .secrets/.env.prod
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      MQTT_BROKER: ${MQTT_BROKER}
      MQTT_PORT: ${MQTT_PORT}
      KAFKA_BROKER: ${KAFKA_BROKER}
      API_SERVER_URL: http://inv-api-server:8080
      INTERNAL_KEY: ${INTERNAL_KEY}
    volumes:
      - ./configs/device-server.yaml:/app/config.yaml:ro
      - device-logs:/app/logs
    networks:
      - inv-prod-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8081 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      inv-api-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.5"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ---------- inv-api-server ----------
  inv-api-server:
    image: ghcr.io/mcmrzy/inv-api-server:${IMAGE_TAG:-latest}
    container_name: inv-api-server
    expose:
      - "8080"
    env_file:
      - .secrets/.env.prod
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      DEVICE_SERVER_URL: http://inv-device-server:8081
      INTERNAL_KEY: ${INTERNAL_KEY}
      INTERNAL_API_SECRET: ${INTERNAL_KEY}
      JPUSH_ENABLED: ${JPUSH_ENABLED:-false}
      JPUSH_APP_KEY: ${JPUSH_APP_KEY}
      JPUSH_MASTER_SECRET: ${JPUSH_MASTER_SECRET}
      JPUSH_TIMEOUT: ${JPUSH_TIMEOUT:-10}
      JPUSH_DEDUP_TTL: ${JPUSH_DEDUP_TTL:-120}
    volumes:
      - ./configs/api-server.yaml:/app/config.yaml:ro
    networks:
      - inv-prod-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.5"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ---------- api-gateway ----------
  api-gateway:
    image: ghcr.io/mcmrzy/api-gateway:${IMAGE_TAG:-latest}
    container_name: inv-api-gateway
    ports:
      - "8080:8080"
    env_file:
      - .secrets/.env.prod
    environment:
      JWT_SECRET: ${JWT_SECRET}
      API_SERVER_URL: http://inv-api-server:8080
      DEVICE_SERVER_URL: http://inv-device-server:8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ./configs/gateway.yaml:/app/config.yaml:ro
    networks:
      - inv-prod-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      inv-api-server:
        condition: service_healthy
      inv-device-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ---------- inv-admin-frontend ----------
  inv-admin-frontend:
    image: ghcr.io/mcmrzy/inv-admin-frontend:${IMAGE_TAG:-latest}
    container_name: inv-admin-frontend
    expose:
      - "80"
    networks:
      - inv-prod-network
    restart: unless-stopped
    depends_on:
      - api-gateway
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: inv-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - inv-prod-network
    restart: unless-stopped
    depends_on:
      - inv-admin-frontend
      - api-gateway
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

networks:
  inv-prod-network:
    driver: bridge

volumes:
  pg-data:
  redis-data:
  device-logs:
