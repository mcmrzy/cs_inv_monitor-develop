services:
  mqtt-kafka-bridge:
    build: ../mqtt-kafka-bridge
    container_name: mqtt-kafka-bridge
    ports:
      - "8080:8080"
    volumes:
      - ../mqtt-kafka-bridge/config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
