# ============================================
# Prometheus 告警规则
# 配置: Prometheus → Alertmanager
# ============================================

groups:
  - name: inv-mqtt-alerts
    rules:
      # --- MQTT 消息丢弃 ---
      - alert: MQTTDataDropped
        expr: inv_device_server_mqtt_data_dropped > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "MQTT 消息丢弃 (instance {{ $labels.instance }})"
          description: "inv_device_server 数据通道满，已丢弃 {{ $value }} 条消息。检查消费速率与 EMQX 消息速率。"

      # --- 实例宕机 ---
      - alert: InvDeviceServerDown
        expr: up{job="inv-device-server"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "inv_device_server 实例宕机 ({{ $labels.instance }})"
          description: "inv_device_server 实例 {{ $labels.instance }} 已不可达超过 1 分钟。"

      # --- PostgreSQL 连接数告警 ---
      - alert: PgConnectionHigh
        expr: pg_stat_database_numbackends{datname="inv_mqtt"} > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL 连接数过高 ({{ $value }})"
          description: "inv_mqtt 数据库当前连接数 {{ $value }}，超过 80% 阈值。"

      # --- Redis 内存告警 ---
      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis 内存使用率过高 ({{ $value | humanizePercentage }})"
          description: "Redis 内存使用率 {{ $value | humanizePercentage }}。"

      # --- EMQX 连接数急剧下降 ---
      - alert: EMQXConnectionDrop
        expr: rate(emqx_connections_count[5m]) < -50
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "EMQX 连接数急剧下降"
          description: "EMQX 连接数 5 分钟内下降超过 50/s，可能批量断连。"

      # --- Stream 积压 ---
      - alert: StreamPendingHigh
        expr: inv_device_server_stream_pending > 5000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis Stream 消息积压 ({{ $value }})"
          description: "device:stream 待消费消息超过 5000 条。"

      # --- Kafka 降级检测 ---
      - alert: StreamConsumerLag
        expr: inv_device_server_stream_pending > 10000
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Redis Stream 严重积压 ({{ $value }})"
          description: "device:stream 待消费消息超过 10000 条，需扩容消费者。"
