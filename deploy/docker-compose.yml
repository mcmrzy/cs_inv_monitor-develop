version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: inv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-inv_mqtt}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${DB_NAME:-inv_mqtt}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - inv-net

  redis:
    image: redis:7-alpine
    container_name: inv-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    networks:
      - inv-net

  mqtt:
    image: emqx/emqx:5.3.0
    container_name: inv-mqtt
    restart: unless-stopped
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: 0.0.0.0
      EMQX_ALLOW_ANONYMOUS: "true"
      EMQX_NODE__COOKIE: "inv-mqtt-cookie-2026"
      EMQX_MQTT__MAX_PACKET_SIZE: 1MB
      EMQX_MQTT__MAX_CLIENT_PACKET_RATE: 1000
    ports:
      - "1883:1883"
      - "18083:18083"
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - inv-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: inv-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - inv-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: inv-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - inv-net

  mqtt-kafka-bridge:
    build:
      context: ../mqtt-kafka-bridge
      dockerfile: Dockerfile
    image: mqtt-kafka-bridge:latest
    container_name: inv-mqtt-kafka-bridge
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      MQTT_BROKER: jiuxiaoyw.online
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: inv-telemetry
      WEBHOOK_PORT: "8083"
    depends_on:
      kafka:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    networks:
      - inv-net

  inv-api-server:
    build:
      context: ../inv_api_server
      dockerfile: Dockerfile
    image: inv-api-server:latest
    container_name: inv-api-server
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-inv_mqtt}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET}
      DEVICE_SERVER_URL: http://inv-device-server:8081
      INTERNAL_KEY: ${INTERNAL_KEY}
      INTERNAL_API_SECRET: ${INTERNAL_KEY}
      SERVER_URL: ${SERVER_URL:-http://192.168.8.248:8080}
      AMAP_API_KEY: a1747dbd3566aa8883fffde623290cd9
      WEATHER_SOURCE: amap
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
    volumes:
      - firmware_data:/data/firmware
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inv-net

  inv-device-server:
    build:
      context: ../inv_device_server
      dockerfile: Dockerfile
    image: inv-device-server:latest
    container_name: inv-device-server
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-inv_mqtt}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MQTT_BROKER: ${MQTT_BROKER:-jiuxiaoyw.online}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-CSKJ-INV-SERVER-DEVICE}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      KAFKA_BROKER: jiuxiaoyw.online:9092
      API_SERVER_URL: http://inv-api-server:8080
      INTERNAL_KEY: ${INTERNAL_KEY}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inv-net

  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    image: api-gateway:latest
    container_name: inv-api-gateway
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      API_SERVER_URL: http://inv-api-server:8080
      DEVICE_SERVER_URL: http://inv-device-server:8081
    ports:
      - "80:8080"
    depends_on:
      - inv-api-server
      - inv-device-server
    networks:
      - inv-net

  inv-admin-frontend:
    build:
      context: ../inv-admin-frontend
      dockerfile: Dockerfile
    image: inv-admin-frontend:latest
    container_name: inv-admin-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - inv-net

