services:
  postgres:
    build:
      context: ..
      dockerfile: deploy/postgres/Dockerfile
    image: inv-postgres-tls:2.28.2-pg18
    container_name: inv-postgres
    restart: unless-stopped
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/var/lib/postgresql/tls/server.crt
      - -c
      - ssl_key_file=/var/lib/postgresql/tls/server.key
    environment:
      POSTGRES_DB: ${DB_NAME:-inv_mqtt}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: UTC
    # 暴露端口供外部访问
    ports:
      - "127.0.0.1:5432:5432"
    expose:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${DB_NAME:-inv_mqtt}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - inv-net

  redis:
    image: redis:7-alpine
    container_name: inv-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --notify-keyspace-events Ex
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    # 生产环境不暴露端口，仅通过Docker内部网络访问
    # 如需本地调试，取消注释下面的行
    # ports:
    #   - "127.0.0.1:6379:6379"
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      retries: 5
    networks:
      - inv-net

  inv-api-server:
    build:
      context: ..
      dockerfile: inv_api_server/Dockerfile
    image: inv-api-server:latest
    container_name: inv-api-server
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-inv_mqtt}
      DB_SSL_MODE: ${DB_SSL_MODE:-require}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      DEVICE_SERVER_URL: http://inv-device-server:8081
      INTERNAL_KEY: ${INTERNAL_KEY}
      INTERNAL_API_SECRET: ${INTERNAL_KEY}
      SERVER_URL: ${SERVER_URL:-http://192.168.8.50:8888}
      AMAP_API_KEY: ${AMAP_API_KEY:-}
      WEATHER_SOURCE: ${WEATHER_SOURCE:-open-meteo}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      JPUSH_ENABLED: ${JPUSH_ENABLED:-false}
      JPUSH_APP_KEY: ${JPUSH_APP_KEY}
      JPUSH_MASTER_SECRET: ${JPUSH_MASTER_SECRET}
      JPUSH_TIMEOUT: ${JPUSH_TIMEOUT:-10}
      JPUSH_DEDUP_TTL: ${JPUSH_DEDUP_TTL:-120}
    volumes:
      - firmware_data:/data/firmware
    ports:
      - "8081:8080"  # 固件下载专用端口，绕过Gateway避免传输卡顿
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inv-net

  inv-device-server:
    build:
      context: ../inv_device_server
      dockerfile: Dockerfile
    image: inv-device-server:latest
    container_name: inv-device-server
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-inv_mqtt}
      DB_SSL_MODE: ${DB_SSL_MODE:-require}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MQTT_BROKER: ${MQTT_BROKER:-jiuxiaoyw.online}
      MQTT_PORT: ${MQTT_PORT:-8883}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-CSKJ-INV-SERVER-DEVICE-LOCAL}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TLS_INSECURE: ${MQTT_TLS_INSECURE:-false}
      MQTT_CERT_SHA256: ${MQTT_CERT_SHA256:-}
      # DEV/TEST ONLY: set MQTT_TLS_SKIP_VERIFY=true to skip all TLS cert
      # verification. Never enable in production — use cert pinning instead.
      MQTT_TLS_SKIP_VERIFY: ${MQTT_TLS_SKIP_VERIFY:-false}
      KAFKA_BROKER: jiuxiaoyw.online:9092
      API_SERVER_URL: http://inv-api-server:8080
      INTERNAL_KEY: ${INTERNAL_KEY}
    expose:
      - "8081"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8081 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      inv-api-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inv-net

  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    image: api-gateway:latest
    container_name: inv-api-gateway
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      API_SERVER_URL: http://inv-api-server:8080
      DEVICE_SERVER_URL: http://inv-device-server:8081
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-inv_mqtt}
      DB_SSL_MODE: ${DB_SSL_MODE:-require}
    ports:
      - "8888:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      inv-api-server:
        condition: service_healthy
      inv-device-server:
        condition: service_started
    networks:
      - inv-net

  inv-admin-frontend:
    build:
      context: ../inv-admin-frontend
      dockerfile: Dockerfile
    image: inv-admin-frontend:latest
    container_name: inv-admin-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - inv-net

networks:
  inv-net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  firmware_data:
