version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: inv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-inv_mqtt}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # 生产环境不暴露端口，仅通过Docker内部网络访问
    # 如需本地调试，取消注释下面的行
    # ports:
    #   - "127.0.0.1:5432:5432"
    expose:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${DB_NAME:-inv_mqtt}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - inv-net

  redis:
    image: redis:7-alpine
    container_name: inv-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --notify-keyspace-events Ex
    # 生产环境不暴露端口，仅通过Docker内部网络访问
    # 如需本地调试，取消注释下面的行
    # ports:
    #   - "127.0.0.1:6379:6379"
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    networks:
      - inv-net

  inv-api-server:
    build:
      context: ../inv_api_server
      dockerfile: Dockerfile
    image: inv-api-server:latest
    container_name: inv-api-server
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-inv_mqtt}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      DEVICE_SERVER_URL: http://inv-device-server:8081
      INTERNAL_KEY: ${INTERNAL_KEY}
      INTERNAL_API_SECRET: ${INTERNAL_KEY}
      SERVER_URL: ${SERVER_URL:-http://192.168.8.248:8081}
      AMAP_API_KEY: a1747dbd3566aa8883fffde623290cd9
      WEATHER_SOURCE: amap
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
    volumes:
      - firmware_data:/data/firmware
      - ../database:/app/database:ro  # 挂载数据库迁移文件，启动时自动执行
    ports:
      - "8081:8080"  # 固件下载专用端口，绕过Gateway避免传输卡顿
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inv-net

  inv-device-server:
    build:
      context: ../inv_device_server
      dockerfile: Dockerfile
    image: inv-device-server:latest
    container_name: inv-device-server
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-inv_mqtt}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MQTT_BROKER: ${MQTT_BROKER:-jiuxiaoyw.online}
      MQTT_PORT: ${MQTT_PORT:-8883}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-CSKJ-INV-SERVER-DEVICE-LOCAL}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TLS_INSECURE: ${MQTT_TLS_INSECURE:-false}
      KAFKA_BROKER: jiuxiaoyw.online:9092
      API_SERVER_URL: http://inv-api-server:8080
      INTERNAL_KEY: ${INTERNAL_KEY}
    expose:
      - "8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inv-net

  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    image: api-gateway:latest
    container_name: inv-api-gateway
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      API_SERVER_URL: http://inv-api-server:8080
      DEVICE_SERVER_URL: http://inv-device-server:8081
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-inv_mqtt}
    ports:
      - "8888:8080"
    depends_on:
      inv-api-server:
        condition: service_healthy
      inv-device-server:
        condition: service_healthy
    networks:
      - inv-net

  inv-admin-frontend:
    build:
      context: ../inv-admin-frontend
      dockerfile: Dockerfile
    image: inv-admin-frontend:latest
    container_name: inv-admin-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - inv-net

  prometheus:
    image: prom/prometheus:latest
    container_name: inv-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - inv-net

  grafana:
    image: grafana/grafana:latest
    container_name: inv-grafana
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: "/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      # 中文界面
      GF_USERS_DEFAULT_LANGUAGE: "zh-Hans"
      # 启用 Grafana Live (WebSocket)
      GF_LIVE_ALLOWED_ORIGINS: "*"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboard.json:/etc/grafana/provisioning/dashboards/inv-mqtt.json:ro
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - inv-net

networks:
  inv-net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  prometheus_data:
  grafana_data:
  firmware_data:
